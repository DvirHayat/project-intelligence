name: Delete Branch After Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  delete-branch:
    name: Delete merged branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Delete branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Don't delete protected branches
            const protectedBranches = ['main', 'master', 'develop', 'staging', 'production'];
            if (protectedBranches.includes(branch)) {
              console.log(`Skipping deletion of protected branch: ${branch}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`Successfully deleted branch: ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`Branch ${branch} was already deleted.`);
              } else {
                throw err;
              }
            }
