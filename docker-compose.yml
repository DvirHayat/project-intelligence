services:

  postgres:
    image: postgres:16
    env_file:
      - .env.postgres
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:  
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    env_file:
      - .env.backend

volumes:
  postgres_data: